<!DOCTYPE html>
<html>
<head>
  <title>HTTP/3 AI Streaming Example</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      color: #888;
      font-size: 14px;
    }
    .header .badge {
      display: inline-block;
      background: #7c3aed;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 10px;
    }
    .chat-container {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      min-height: 400px;
      display: flex;
      flex-direction: column;
    }
    .status {
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      text-align: center;
    }
    .status.connected {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }
    .status.disconnected {
      background: rgba(255, 107, 107, 0.1);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 10px;
    }
    .message {
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
    }
    .message.user {
      background: #7c3aed;
      margin-left: auto;
      text-align: right;
    }
    .message.ai {
      background: #0f3460;
      border: 1px solid #1a1a4e;
    }
    .message-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .input-area {
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #0f3460;
      color: #eee;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #7c3aed;
    }
    input[type="text"]::placeholder {
      color: #666;
    }
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button.send {
      background: linear-gradient(135deg, #7c3aed, #00d4ff);
      color: white;
    }
    button.send:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }
    button.send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .comparison {
      margin-top: 30px;
      padding: 20px;
      background: #16213e;
      border-radius: 12px;
    }
    .comparison h3 {
      margin-top: 0;
      color: #00d4ff;
    }
    .comparison table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .comparison th, .comparison td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    .comparison th {
      color: #888;
      font-weight: normal;
    }
    .comparison .highlight {
      color: #00d4ff;
    }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 18px;
      background: #00d4ff;
      margin-left: 2px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ChatGPT-style Streaming over HTTP/3</h1>
    <div class="subtitle">Powered by WebTransport (QUIC), not WebSocket</div>
    <div class="badge">http3x-ai-stream</div>
  </div>

  <div class="chat-container">
    <div id="status" class="status disconnected">Connecting...</div>
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Type something... (e.g. hello)" />
      <button id="sendBtn" class="send" onclick="send()">Send</button>
    </div>
  </div>

  <div class="comparison">
    <h3>Why this is different</h3>
    <table>
      <tr>
        <th></th>
        <th>WebSocket</th>
        <th class="highlight">http3x</th>
      </tr>
      <tr>
        <td>Protocol</td>
        <td>TCP</td>
        <td class="highlight">QUIC (HTTP/3)</td>
      </tr>
      <tr>
        <td>Streams</td>
        <td>Single stream</td>
        <td class="highlight">Multiplexed streams</td>
      </tr>
      <tr>
        <td>Datagram</td>
        <td>No support</td>
        <td class="highlight">Built-in datagram</td>
      </tr>
      <tr>
        <td>Head-of-line blocking</td>
        <td>Yes</td>
        <td class="highlight">No</td>
      </tr>
    </table>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    let writer, reader;
    let isStreaming = false;
    let currentAiMessage = null;

    async function init() {
      try {
        const transport = new WebTransport("https://localhost:4433/chat", { allowInsecure: true });

        await transport.ready;
        statusEl.textContent = 'Connected via HTTP/3 WebTransport';
        statusEl.className = 'status connected';

        const stream = await transport.createBidirectionalStream();
        writer = stream.writable.getWriter();
        reader = stream.readable.getReader();

        readLoop();

        transport.closed.then(() => {
          statusEl.textContent = 'Connection closed';
          statusEl.className = 'status disconnected';
          sendBtn.disabled = true;
        });
      } catch (error) {
        statusEl.textContent = `Error: ${error.message}`;
        statusEl.className = 'status disconnected';
        sendBtn.disabled = true;
      }
    }

    async function readLoop() {
      const decoder = new TextDecoder();

      while (true) {
        try {
          const { value, done } = await reader.read();
          if (done) break;

          const text = decoder.decode(value);

          if (!currentAiMessage) {
            currentAiMessage = createMessage('ai', '');
          }

          currentAiMessage.contentEl.textContent += text;
          messagesEl.scrollTop = messagesEl.scrollHeight;

          if (isStreaming) {
            isStreaming = false;
            sendBtn.disabled = false;
            inputEl.disabled = false;
            inputEl.focus();
          }
        } catch (e) {
          break;
        }
      }
    }

    function createMessage(type, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;

      const labelDiv = document.createElement('div');
      labelDiv.className = 'message-label';
      labelDiv.textContent = type === 'user' ? 'You' : 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;

      if (type === 'ai') {
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        contentDiv.appendChild(cursor);
      }

      msgDiv.appendChild(labelDiv);
      msgDiv.appendChild(contentDiv);
      messagesEl.appendChild(msgDiv);

      return { element: msgDiv, contentEl: contentDiv };
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || !writer || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;

      createMessage('user', text);
      inputEl.value = '';

      currentAiMessage = null;

      const encoder = new TextEncoder();
      await writer.write(encoder.encode(text));

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        send();
      }
    });

    init();
  </script>
</body>
</html>
